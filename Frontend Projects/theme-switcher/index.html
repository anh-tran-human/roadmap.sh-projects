<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Theme Switcher with CSS Variables for roadmap.sh Frontend Projects">
    <meta name="author" content="Anh Tran">
    <title>Theme Switcher with CSS Variables for roadmap.sh</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="theme-wrapper">

    <main class="preview-card">

        <fieldset class="theme-controls">
            <input type="radio" id="theme-light" name="theme" value="light" checked>
            <label for="theme-light">Light</label>

            <input type="radio" id="theme-dark" name="theme" value="dark">
            <label for="theme-dark">Dark</label>

            <input type="radio" id="theme-custom" name="theme" value="custom">
            <label for="theme-custom">Custom</label>
        </fieldset>

        <h2>Hello, World!</h2>
        <p>This is a simple card that changes theme with CSS variables.</p>
        <button class="cta-button">Primary Button</button>
        
    </main>

  </div>

</body>
</html>
